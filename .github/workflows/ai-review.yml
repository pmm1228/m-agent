name: AI Code Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      # 调你的 Agent
      - name: Call AI Reviewer
        env:
          REVIEW_AGENT_URL: ${{ secrets.CODE_REVIEW_AGENT_URL }}
          REVIEW_WEBHOOK_TOKEN: ${{ secrets.CODE_REVIEW_AGENT_SECRET }}
          REVIEW_GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          : "${REVIEW_AGENT_URL:?Missing CODE_REVIEW_AGENT_URL secret}"
          : "${REVIEW_WEBHOOK_TOKEN:?Missing CODE_REVIEW_AGENT_SECRET secret}"

          REVIEW_AGENT_URL="${REVIEW_AGENT_URL%/}"

          response_file="$(mktemp)"
          http_code="$(curl \
            --show-error \
            --silent \
            --location \
            --max-time 300 \
            --retry 2 \
            --retry-delay 5 \
            --output "$response_file" \
            --write-out "%{http_code}" \
            -X POST "$REVIEW_AGENT_URL/api/reviews/github-actions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${REVIEW_WEBHOOK_TOKEN}" \
            -H "X-GitHub-Token: ${REVIEW_GITHUB_TOKEN}" \
            -H "X-GitHub-Event: $GITHUB_EVENT_NAME" \
            -d @- <<'JSON'
          {
            "owner": ${{ toJson(github.repository_owner) }},
            "repo": ${{ toJson(github.event.repository.name) }},
            "pull_number": ${{ github.event.pull_request.number }},
            "head_sha": ${{ toJson(github.event.pull_request.head.sha) }},
            "dry_run": false
          }
          JSON
          )"

          echo "AI reviewer HTTP status: $http_code"
          cat "$response_file"

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi
