name: AI Code Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      # 拉代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # 调你的 Agent
      - name: Call AI Reviewer
        env:
          REVIEW_ENDPOINT: https://chewable-helpful-sleeve.ngrok-free.dev/api/reviews/github-actions
          REVIEW_WEBHOOK_TOKEN: ${{ secrets.AI_REVIEW_WEBHOOK_TOKEN }}
          REVIEW_GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          curl --fail-with-body \
            --show-error \
            --silent \
            --location \
            --max-time 300 \
            --retry 2 \
            --retry-delay 5 \
            -X POST "$REVIEW_ENDPOINT" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${REVIEW_WEBHOOK_TOKEN}" \
            -H "X-GitHub-Token: ${REVIEW_GITHUB_TOKEN}" \
            -H "X-GitHub-Event: $GITHUB_EVENT_NAME" \
            -d @- <<'JSON'
          {
            "owner": ${{ toJson(github.repository_owner) }},
            "repo": ${{ toJson(github.event.repository.name) }},
            "pull_number": ${{ github.event.pull_request.number }},
            "head_sha": ${{ toJson(github.event.pull_request.head.sha) }},
            "dry_run": false
          }
          JSON
