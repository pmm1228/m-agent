name: AI Code Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
      # 拉代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # 调你的 Agent
      - name: Call AI Reviewer
        env:
          REVIEW_ENDPOINT: https://your-agent.com/review
          REVIEW_WEBHOOK_TOKEN: ${{ secrets.AI_REVIEW_WEBHOOK_TOKEN }}
        run: |
          set -euo pipefail

          curl --fail-with-body \
            --show-error \
            --silent \
            --location \
            --max-time 300 \
            --retry 2 \
            --retry-delay 5 \
            -X POST "$REVIEW_ENDPOINT" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${REVIEW_WEBHOOK_TOKEN}" \
            -H "X-GitHub-Event: $GITHUB_EVENT_NAME" \
            -d @- <<'JSON'
          {
            "repository": ${{ toJson(github.repository) }},
            "repository_owner": ${{ toJson(github.repository_owner) }},
            "pull_request": {
              "number": ${{ github.event.pull_request.number }},
              "title": ${{ toJson(github.event.pull_request.title) }},
              "html_url": ${{ toJson(github.event.pull_request.html_url) }},
              "base_ref": ${{ toJson(github.event.pull_request.base.ref) }},
              "base_sha": ${{ toJson(github.event.pull_request.base.sha) }},
              "head_ref": ${{ toJson(github.event.pull_request.head.ref) }},
              "head_sha": ${{ toJson(github.event.pull_request.head.sha) }},
              "author": ${{ toJson(github.event.pull_request.user.login) }}
            },
            "event": {
              "name": ${{ toJson(github.event_name) }},
              "action": ${{ toJson(github.event.action) }},
              "run_id": ${{ github.run_id }},
              "run_attempt": ${{ github.run_attempt }}
            },
            "github": {
              "api_url": ${{ toJson(github.api_url) }},
              "server_url": ${{ toJson(github.server_url) }}
            }
          }
          JSON
